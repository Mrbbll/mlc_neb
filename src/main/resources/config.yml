# ============================================================================
# mlc_neb — 默认配置文件 (config.yml)
# ============================================================================
#
# 首次加载时自动生成。修改后执行 /neb reload 即可热重载。
# 部分选项（如玩家列表变更）需要 /neb reload 才能生效。
# ============================================================================

# ----------------------------------------------------------------------------
# NEB 启用的玩家设置
# ----------------------------------------------------------------------------

# 强制为所有玩家启用 NEB 优化（跳过握手检测）。
# 适用于服务器上所有玩家都已安装 NEB 模组的场景。
# 设为 true 后，所有玩家加入时自动启用 NEB，无需手动配置 UUID。
force-enable-all: false

# NEB 启用玩家 UUID 列表（当 force-enable-all 为 false 时生效）。
# 握手检测失败后，会回退到此列表判断。
# 也可以使用 /neb enable <玩家名> / /neb disable <玩家名> 动态管理。
neb-enabled-players:
  # 示例:
  # - "12345678-1234-1234-1234-123456789abc"
  # - "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"

# ----------------------------------------------------------------------------
# 聚合与压缩设置
# ----------------------------------------------------------------------------
aggregation:

  # 是否启用数据包聚合+Zstd压缩
  # 关闭后所有数据包正常发送（无优化）
  enabled: true

  # 刷新间隔（毫秒），默认 20ms = 1 tick
  # 更短 = 更低延迟但压缩效果略差
  # 有效范围: 10-100ms
  flush-interval-ms: 20

  # 触发 Zstd 压缩的最小原始数据大小（字节）
  # 小于此值的数据在聚合包内不压缩直接发送
  compression-threshold: 32

  # Zstd 压缩级别 (1-22)
  # 1 = 最快、压缩率最低
  # 3 = 平衡（默认推荐）
  # 19+ = 极慢但压缩率极高
  # 注意: 变更此项对"已在 NEB 中"的在线玩家不生效,需 /neb disable 再 enable 重建 Zstd 上下文。
  compression-level: 3

  # Zstd 上下文窗口级别 (21-25)，窗口大小 = 2^级别 字节
  # 21=2MB | 22=4MB | 23=8MB(默认) | 24=16MB | 25=32MB
  # 更大窗口 = 更高压缩率但占用更多内存
  # 100 名玩家 @ 级别25: 约额外占用 3.2GB 内存
  # 注意: 同上, 变更不影响已启用在线玩家。
  context-level: 23

  # 单个聚合帧(外层)的最大原始字节数,超过将自动拆成多帧。
  # 支持后缀: B, KB, MB（如 "4MB", "512KB"）  有效范围: 2MB - 64MB
  # flush 时若累计子包超过此值的 85%, 先封一帧再开新帧。
  max-packet-size: "4MB"

# ----------------------------------------------------------------------------
# 兼容性设置
# ----------------------------------------------------------------------------
compatibility:

  # 兼容模式。启用后黑名单中的数据包将绕过聚合（立即发送）
  enabled: false

  # 不应被聚合的数据包类型列表（对时序敏感或状态依赖的包）
  # 会被系统黑名单强制跳过的包（无需列在此处）:
  #   neb:packet_aggregation_packet (避免无限递归)
  #   minecraft:login, minecraft:finish_configuration (登录/配置)
  #   minecraft:keep_alive (心跳)
  blacklist:
    - "minecraft:command_suggestion"
    - "minecraft:command_suggestions"
    - "minecraft:commands"
    - "minecraft:chat_command"
    - "minecraft:chat_command_signed"
    - "minecraft:player_info_update"
    - "minecraft:player_info_remove"

# ----------------------------------------------------------------------------
# Zstd 上下文排除列表
# ----------------------------------------------------------------------------
# 列表中的玩家 UUID 不会使用 Zstd 上下文复用。
# 上下文复用可随时间改善压缩率，但某些工具（如回放Mod）
# 需要精确的数据包内容，应禁用上下文复用。
context-exclusion:
  player-uuids:
    - "00000000-0000-0000-0000-000000000000"  # 占位符，不匹配任何真实玩家

# ----------------------------------------------------------------------------
# 调试设置
# ----------------------------------------------------------------------------
debug:

  # 启用详细调试日志（每次刷新打印压缩率等信息）
  # 繁忙服务器会产生大量日志，仅用于排查问题
  log: false
